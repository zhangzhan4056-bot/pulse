<style>
  :root {

    --orange: #f97316; --pink: #ec4899;

  body { font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header { text-align: center; padding: 60px 20px 40px; }
  .header h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--text2); font-size: 1.1rem; margin-top: 8px; }

  /* Category badges */
  .cat-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
  .cat-trend { background: rgba(59,130,246,0.15); color: var(--blue); }
  .cat-mean { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .cat-risk { background: rgba(168,85,247,0.15); color: var(--purple); }
  .cat-anti { background: rgba(239,68,68,0.15); color: var(--red); }

  /* Section */
  .section { margin: 40px 0; }
  .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }

  /* Overview table */
  .overview-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .overview-table th { background: var(--surface2); padding: 12px 16px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); white-space: nowrap; }
  .overview-table td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .overview-table tr:hover { background: var(--surface); }
  .overview-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .positive { color: var(--green); } .negative { color: var(--red); }

  /* Strategy card */
  .strat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin: 32px 0; }
  .strat-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .strat-header h2 { font-size: 1.6rem; }
  .strat-desc { color: var(--text2); font-size: 1rem; margin-bottom: 24px; }

  /* Metric cards */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric { background: var(--surface2); border-radius: 12px; padding: 16px; text-align: center; }
  .metric .value { font-size: 1.4rem; font-weight: 700; }
  .metric .label { font-size: 0.75rem; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Flow diagram */
  .flow { background: var(--surface2); border-radius: 12px; padding: 20px; margin: 16px 0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.8; overflow-x: auto; }
  .flow .step { display: flex; align-items: flex-start; gap: 12px; margin: 4px 0; }
  .flow .num { background: var(--blue); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
  .flow .arrow { color: var(--text2); margin: 0 12px; }
  .flow .highlight { color: var(--green); font-weight: 600; }
  .flow .warn { color: var(--yellow); font-weight: 600; }

  /* Chart container */
  .chart-wrap { background: var(--surface2); border-radius: 12px; padding: 20px; margin: 16px 0; overflow-x: auto; }
  .chart-wrap svg { width: 100%; height: 300px; }

  /* Indicator tags */
  .indicators { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .ind-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 12px; font-size: 0.8rem; font-family: 'SF Mono', monospace; }

  /* Yearly bar mini chart */
  .yearly-bars { display: flex; gap: 4px; align-items: flex-end; height: 60px; margin: 8px 0; }
  .yearly-bar { flex: 1; border-radius: 3px 3px 0 0; min-width: 20px; position: relative; transition: all 0.3s; }
  .yearly-bar .yr-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: var(--text2); }
  .yearly-bar .yr-val { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; font-weight: 600; white-space: nowrap; }

  /* Scatter plot */
  .scatter-wrap { background: var(--surface2); border-radius: 12px; padding: 20px; margin: 20px 0; overflow-x: auto; }
  .scatter-wrap svg { width: 100%; height: 300px; }

  /* Comparison matrix */
  .matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin: 20px 0; }
  .matrix-card { background: var(--surface2); border-radius: 12px; padding: 16px; }
  .matrix-card h4 { margin-bottom: 8px; font-size: 0.95rem; }
  .matrix-card ul { list-style: none; padding: 0; }
  .matrix-card li { padding: 4px 0; font-size: 0.85rem; color: var(--text2); }
  .matrix-card li::before { content: ''; margin-right: 6px; }

  /* Footer */
  .footer { text-align: center; padding: 40px; color: var(--text2); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 40px; }

  @media (max-width: 768px) {
    .header h1 { font-size: 1.6rem; }
    .strat-card { padding: 20px; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

  strategies.forEach((s, si) => {
    const vals = curveData[s.name].values;
    const points = vals.map((v, i) => `${x(i)},${y(v)}`).join(' ');
    svg += `<polyline points="${points}" fill="none" stroke="${lineColors[si]}" stroke-width="1.5" opacity="0.8"/>`;
  });

  svg += '</svg>';

  // Legend
  svg += '<div style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:12px">';
  strategies.forEach((s, si) => {
    svg += `<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#9198af">`;
    svg += `<span style="width:20px;height:3px;background:${lineColors[si]};display:inline-block;border-radius:2px"></span>`;
    svg += `${s.name}</span>`;
  });
  svg += '</div>';

  container.innerHTML = svg;
})();

// ============ OVERVIEW TABLE ============
const tbody = document.getElementById('overviewTable');
strategies.forEach(s => {
  const tr = document.createElement('tr');
  const cls = v => v > 0 ? 'positive' : v < 0 ? 'negative' : '';
  tr.innerHTML = `
    <td><strong>${s.name}</strong></td>
    <td><span class="cat-badge ${s.catClass}">${s.cat}</span></td>
    <td class="num ${cls(s.totalReturn)}">${s.totalReturn > 0 ? '+' : ''}${s.totalReturn}%</td>
    <td class="num ${cls(s.annualReturn)}">${s.annualReturn > 0 ? '+' : ''}${s.annualReturn}%</td>
    <td class="num ${cls(s.maxDD)}">${s.maxDD}%</td>
    <td class="num">${s.sharpe.toFixed(2)}</td>
    <td class="num">${s.vol}%</td>
    <td class="num">${s.winRate}%</td>`;
  tbody.appendChild(tr);
});

// ============ SCATTER CHART (SVG) ============
(function() {
  const container = document.getElementById('scatterChart');
  const W = 600, H = 300, PAD = {t:20, r:30, b:50, l:60};
  const chartW = W - PAD.l - PAD.r, chartH = H - PAD.t - PAD.b;

  const minX = Math.min(...strategies.map(s=>s.vol)) - 1;
  const maxX = Math.max(...strategies.map(s=>s.vol)) + 1;
  const minY = Math.min(...strategies.map(s=>s.annualReturn)) - 1;
  const maxY = Math.max(...strategies.map(s=>s.annualReturn)) + 1;

  function sx(v) { return PAD.l + ((v - minX) / (maxX - minX)) * chartW; }
  function sy(v) { return PAD.t + (1 - (v - minY) / (maxY - minY)) * chartH; }

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid
  for (let i = 0; i <= 4; i++) {
    const yy = PAD.t + (i/4)*chartH;
    const val = (maxY - (i/4)*(maxY-minY)).toFixed(0);
    svg += `<line x1="${PAD.l}" y1="${yy}" x2="${W-PAD.r}" y2="${yy}" stroke="#2e3348" stroke-width="0.5"/>`;
    svg += `<text x="${PAD.l-8}" y="${yy+4}" fill="#9198af" font-size="11" text-anchor="end">${val}%</text>`;
  }
  for (let i = 0; i <= 4; i++) {
    const xx = PAD.l + (i/4)*chartW;
    const val = (minX + (i/4)*(maxX-minX)).toFixed(0);
    svg += `<line x1="${xx}" y1="${PAD.t}" x2="${xx}" y2="${H-PAD.b}" stroke="#2e3348" stroke-width="0.5"/>`;
    svg += `<text x="${xx}" y="${H-PAD.b+16}" fill="#9198af" font-size="11" text-anchor="middle">${val}%</text>`;
  }

  // Axis labels
  svg += `<text x="${W/2}" y="${H-5}" fill="#9198af" font-size="12" text-anchor="middle">年化波动率 (%)</text>`;
  svg += `<text x="15" y="${H/2}" fill="#9198af" font-size="12" text-anchor="middle" transform="rotate(-90,15,${H/2})">年化收益 (%)</text>`;

  // Points
  strategies.forEach(s => {
    const color = catColors[s.cat];
    svg += `<circle cx="${sx(s.vol)}" cy="${sy(s.annualReturn)}" r="8" fill="${color}99" stroke="${color}" stroke-width="2">`;
    svg += `<title>${s.name}: 年化 ${s.annualReturn}%, 波动率 ${s.vol}%</title></circle>`;
  });

  svg += '</svg>';

  // Legend
  svg += '<div style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:12px">';
  Object.keys(catColors).forEach(cat => {
    svg += `<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#9198af">`;
    svg += `<span style="width:12px;height:12px;background:${catColors[cat]}80;border:2px solid ${catColors[cat]};border-radius:50%;display:inline-block"></span>`;
    svg += `${cat}</span>`;
  });
  svg += '</div>';

  container.innerHTML = svg;
})();

// ============ STRATEGY CARDS ============
const cardsDiv = document.getElementById('strategyCards');
strategies.forEach((s, idx) => {
  const years = Object.keys(s.yearly);
  const vals = Object.values(s.yearly);
  const maxAbs = Math.max(...vals.map(Math.abs), 1);

  const flowHtml = s.flow.map((f, i) => {
    if (f.type === 'decision') return `<div class="step"><span class="num" style="background:var(--yellow)">${i+1}</span><span>  ${f.text}?</span></div>`;
    if (f.type === 'result') return `<div class="step"><span class="num" style="background:var(--green)">${i+1}</span><span class="${f.cls||''}">${f.text}</span></div>`;
    if (f.type === 'warn') return `<div class="step"><span class="num" style="background:var(--red)">${i+1}</span><span class="warn">${f.text}</span></div>`;
    return `<div class="step"><span class="num">${i+1}</span><span>${f.text}</span></div>`;
  }).join('');

  const yearlyBars = years.map((yr, i) => {
    const v = vals[i];
    const h = Math.abs(v) / maxAbs * 50;
    const color = v >= 0 ? 'var(--green)' : 'var(--red)';
    return `<div class="yearly-bar" style="height:${Math.max(h,2)}px;background:${color}">
      <span class="yr-val" style="color:${color}">${v > 0 ? '+' : ''}${v}%</span>
      <span class="yr-label">${yr}</span>
    </div>`;
  }).join('');

  const indTags = s.indicators.map(i => `<span class="ind-tag">${i}</span>`).join('');

  cardsDiv.innerHTML += `
  <div class="strat-card" id="strat-${idx}">
    <div class="strat-header">
      <h2>${s.name}</h2>
      <span class="cat-badge ${s.catClass}">${s.cat}</span>
    </div>
    <p class="strat-desc">${s.desc}</p>

    <div class="metrics">
      <div class="metric"><div class="value ${s.totalReturn > 0 ? 'positive' : 'negative'}">${s.totalReturn > 0 ? '+' : ''}${s.totalReturn}%</div><div class="label">总收益</div></div>
      <div class="metric"><div class="value ${s.annualReturn > 0 ? 'positive' : 'negative'}">${s.annualReturn > 0 ? '+' : ''}${s.annualReturn}%</div><div class="label">年化</div></div>
      <div class="metric"><div class="value negative">${s.maxDD}%</div><div class="label">最大回撤</div></div>
      <div class="metric"><div class="value">${s.sharpe.toFixed(2)}</div><div class="label">夏普</div></div>
      <div class="metric"><div class="value">${s.vol}%</div><div class="label">波动率</div></div>
      <div class="metric"><div class="value">${s.winRate}%</div><div class="label">月度胜率</div></div>
      <div class="metric"><div class="value negative">${s.worstMonth}%</div><div class="label">最差月</div></div>
      <div class="metric"><div class="value positive">+${s.bestMonth}%</div><div class="label">最佳月</div></div>
    </div>

    <h3 style="margin:16px 0 8px;font-size:1rem">  使用的技术指标</h3>
    <div class="indicators">${indTags}</div>

    ${s.params ? `
    <h3 style="margin:16px 0 8px;font-size:1rem">  关键参数</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;">
      ${s.params.map(p => `<div style="background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:8px 12px;">
        <div style="font-size:12px;color:var(--text2)">${p.name}</div>
        <div style="font-size:14px;font-weight:600;margin-top:2px">${p.value}</div>
      </div>`).join('')}
    </div>` : ''}

    ${s.positionRules ? `
    <h3 style="margin:16px 0 8px;font-size:1rem">  仓位规则</h3>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${s.positionRules.map(r => {
        const c = r.color === 'green' ? 'var(--green)' : r.color === 'red' ? 'var(--red)' : r.color === 'yellow' ? 'var(--yellow)' : 'var(--blue)';
        return `<div style="display:flex;align-items:center;gap:8px;font-size:13px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span>
          <span style="flex:1;color:var(--text2)">${r.condition}</span>
          <span style="font-weight:600;color:${c}">${r.weight}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${s.allocLogic ? `
    <h3 style="margin:16px 0 8px;font-size:1rem">  配置逻辑</h3>
    <div style="background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2);line-height:1.6">${s.allocLogic}</div>` : ''}

    <h3 style="margin:16px 0 8px;font-size:1rem">⚙️ 运行流程</h3>
    <div class="flow">${flowHtml}</div>

    <h3 style="margin:16px 0 8px;font-size:1rem">  年度收益</h3>
    <div class="yearly-bars">${yearlyBars}</div>
    <div style="display:flex;gap:20px;margin-top:16px;font-size:0.85rem;color:var(--text2)">
      <div><strong style="color:var(--green)"> 优势:</strong> ${s.pros}</div>
      <div><strong style="color:var(--red)"> 劣势:</strong> ${s.cons}</div>
    </div>
    <div style="display:flex;gap:20px;margin-top:8px;font-size:0.85rem;color:var(--text2)">
      <div><strong style="color:var(--blue)"> 适合:</strong> ${s.bestFor}</div>
      <div><strong style="color:var(--yellow)"> 不适合:</strong> ${s.worstFor}</div>
    </div>
  </div>`;
});

// ============ SCENARIO MATRIX ============
const scenarios = [
  { title: '  单边牛市', items: ['  反脆弱 (+54% in 2020)', '  双动量 (+39%)', '  回撤控制 (+43%)', '  趋势跟踪 (+12% in 2021)'] },
  { title: '  震荡市', items: ['  动量+波动率 (低波自动降仓)', '  尾部风险平价 (CVaR 筛选)', '  均值回归 (RSI 高抛低吸)'] },
  { title: '  暴跌/黑天鹅', items: ['  反脆弱 (BS put 凸性收益)', '  反脆弱激进版 (3% OTM 更频繁触发)', '  回撤约束优化 (-17% 最大回撤)'] },
  { title: '  慢熊/阴跌', items: ['  回撤约束优化 (资产级筛选)', '  尾部风险平价 (熊市降仓)', '  双动量 (绝对动量过滤)'] },
  { title: '  保本优先', items: ['  回撤约束优化 (回撤 -17%)', '  尾部风险平价 (回撤 -20%)', '  双动量 (回撤 -21%)'] },
  { title: '  追求高收益', items: ['  反脆弱 (+261% 总收益)', '  反脆弱激进版 (+212%)', '  双动量 (+230%)'] },
];
const matrixDiv = document.getElementById('scenarioMatrix');
scenarios.forEach(sc => {
  matrixDiv.innerHTML += `<div class="matrix-card"><h4>${sc.title}</h4><ul>${sc.items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
});

// 移除加载提示
var loadMsg = document.getElementById('loadingMsg');
if (loadMsg) loadMsg.remove();

} catch(err) {
  console.error('Script error:', err);
  document.querySelector('.container').insertAdjacentHTML('afterbegin',
    '<div style="background:#ef444422;border:1px solid #ef4444;padding:16px;border-radius:8px;margin:20px 0;color:#ef4444">' +
    '<strong>脚本加载出错:</strong> ' + err.message + '<br>请检查网络连接或刷新页面重试</div>');
}
} // end initPage

// 初始化页面
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initPage);
} else {
  initPage();
}
</script>
</body>
</html>
